[package]
name = "uplot-rs"
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
description = "uPlot'un yerli Rust portu"
license = "Apache-2.0"
repository = "https://github.com/hakantr/uPlot.rs"

[workspace]
members = ["wasm", "uygulamalar/masaustu"]
resolver = "3"

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
todo = "deny"
unimplemented = "deny"
unreachable = "deny"
indexing_slicing = "deny"

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
todo = "deny"
unimplemented = "deny"
unreachable = "deny"
indexing_slicing = "deny"

[dependencies]
web-time = "1.1.0"

[[example]]
name = "ilk_kart"
