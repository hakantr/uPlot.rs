id = "add-del-series"
kaynak = "../uPlot/demos/add-del-series.html"
fixture = "src/kart/add_del_series.rs#add_del_series_kartı"
viewport = [1920, 600]
device_pixel_ratio = 1
durum = "etkileşimli-dinamik-seri"

[veri]
x_değerleri = "1..=30"
değer_havuzu = "-10..=10"
başlangıç_seri_sayısı = 3
seri_uzunluğu = 30
kanıt_rastgele_üreteci = "mulberry32"
kanıt_tohumu = "0xADDE_1500"

[dinamik_seri]
kaynak_series_indeksi = 2
rust_y_serisi_indeksi = 1
eklenen_çizgi = "orange"
eklenen_dolgu = "rgba(255,165,0,0.1)"
ekleme_api = "Grafik::seri_ekle"
silme_api = "Grafik::seri_sil"
veri_api = "Grafik::veriyi_ayarla"
geçersiz_indeks = "UplotHatası::GeçersizSeriİndeksi"
sahiplik = "çekirdek"

[etkileşim]
ortak_davranış_profili = "resize-temeli-v1"
tekerlek_x_yakınlaştır = true
seçim_yakınlaştır = true
çift_tıkla_tam_görünüm = true
dokunma_xy_yakınlaştır = true
boşluk_sol_sürükleme_taşıma = true

[kanıt]
masaüstü = "uygulamalar/masaustu/src/masaustu.rs"
wasm = "wasm/www/index.html"
svg = "target/add-del-series.svg"
