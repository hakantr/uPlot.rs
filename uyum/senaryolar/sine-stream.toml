viewport = [1920, 900]
device_pixel_ratio = 1
durum = "altı_seri_60fps_kayan_pencere"

[veri]
nokta_sayısı = 600
seri_sayısı = 6
örnek_aralığı_saniye = 300
y_aralığı = [-6, 6]
