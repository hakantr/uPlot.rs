name: nightly-artifacts

on:
  schedule:
    # GitHub cron UTC kullanır: 18:00 UTC = Türkiye saatiyle 21:00.
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  deployments: write
  pages: write
  id-token: write

concurrency:
  group: nightly-artifacts
  cancel-in-progress: true

jobs:
  desktop:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: uplot-rs-macos-arm64
            binary: target/aarch64-apple-darwin/release/chart_listesi
            package: dist/uplot-rs-macos-arm64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: uplot-rs-linux-arm64
            binary: target/aarch64-unknown-linux-gnu/release/chart_listesi
            package: dist/uplot-rs-linux-arm64
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact: uplot-rs-linux-x86_64
            binary: target/x86_64-unknown-linux-gnu/release/chart_listesi
            package: dist/uplot-rs-linux-x86_64
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            artifact: uplot-rs-windows-x86_64
            binary: target/x86_64-pc-windows-msvc/release/chart_listesi.exe
            package: dist/uplot-rs-windows-x86_64
    steps:
      - name: uPlot.rs
        uses: actions/checkout@v6
        with:
          path: uPlot.rs
      - name: Güncel GPUI
        uses: actions/checkout@v6
        with:
          repository: hakantr/gpui
          path: gpui
      - name: Güncel GPUI bileşen kütüphanesi
        uses: actions/checkout@v6
        with:
          repository: hakantr/gpui_kutuphanesi
          path: gpui_kutuphanesi
      - name: Linux sistem bağımlılıkları
        if: runner.os == 'Linux'
        run: >-
          sudo apt-get update && sudo apt-get install -y
          libasound2-dev libfontconfig1-dev libwayland-dev libxkbcommon-dev
          libxkbcommon-x11-dev libxcb1-dev libxcb-render0-dev
          libxcb-shape0-dev libxcb-xfixes0-dev libudev-dev
      - name: Rust hedefi
        uses: dtolnay/rust-toolchain@1.95
        with:
          targets: ${{ matrix.target }}
      - name: Masaüstü chart listesini derle
        working-directory: uPlot.rs
        run: cargo build -p uplot-rs-chart-listesi --release --target ${{ matrix.target }}
      - name: macOS uygulama paketini hazırla
        if: runner.os == 'macOS'
        working-directory: uPlot.rs
        run: |
          app="${{ matrix.package }}/uPlot.rs.app"
          mkdir -p "$app/Contents/MacOS" "$app/Contents/Resources"
          cp "${{ matrix.binary }}" "$app/Contents/MacOS/uplot-rs"
          cp assets/macos/Info.plist "$app/Contents/Info.plist"
          cp assets/icons/uplot-rs.icns "$app/Contents/Resources/uplot-rs.icns"
          chmod +x "$app/Contents/MacOS/uplot-rs"
      - name: Linux masaüstü paketini hazırla
        if: runner.os == 'Linux'
        working-directory: uPlot.rs
        run: |
          paket="${{ matrix.package }}"
          mkdir -p "$paket/bin" "$paket/share/applications" \
            "$paket/share/icons/hicolor/512x512/apps"
          cp "${{ matrix.binary }}" "$paket/bin/uplot-rs"
          cp assets/linux/uplot-rs.desktop "$paket/share/applications/"
          cp assets/icons/uplot-rs.png \
            "$paket/share/icons/hicolor/512x512/apps/uplot-rs.png"
          chmod +x "$paket/bin/uplot-rs"
      - name: Windows EXE paketini hazırla
        if: runner.os == 'Windows'
        working-directory: uPlot.rs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "${{ matrix.package }}" | Out-Null
          Copy-Item "${{ matrix.binary }}" "${{ matrix.package }}/uplot-rs.exe"
          Copy-Item "assets/icons/uplot-rs.ico" "${{ matrix.package }}/uplot-rs.ico"
      - name: Masaüstü artefaktını yükle
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: |
            uPlot.rs/${{ matrix.package }}
            uPlot.rs/README.md
            uPlot.rs/readme_en.md
            uPlot.rs/LICENSE
            uPlot.rs/NOTICE
          if-no-files-found: error
          retention-days: 1

  wasm:
    name: uplot-rs-wasm
    runs-on: ubuntu-24.04
    steps:
      - name: uPlot.rs
        uses: actions/checkout@v6
        with:
          path: uPlot.rs
      - name: Güncel GPUI
        uses: actions/checkout@v6
        with:
          repository: hakantr/gpui
          path: gpui
      - name: Güncel GPUI bileşen kütüphanesi
        uses: actions/checkout@v6
        with:
          repository: hakantr/gpui_kutuphanesi
          path: gpui_kutuphanesi
      - name: Rust ve WASM hedefi
        uses: dtolnay/rust-toolchain@1.95
        with:
          targets: wasm32-unknown-unknown
      - name: wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.120 --locked
      - name: WASM release derlemesi
        working-directory: uPlot.rs
        run: cargo build -p uplot-rs-wasm --release --target wasm32-unknown-unknown
      - name: Tarayıcı bağlarını üret
        working-directory: uPlot.rs
        run: >-
          wasm-bindgen --target web --out-dir wasm/pkg
          target/wasm32-unknown-unknown/release/uplot_rs_wasm.wasm
      - name: Pages paketini hazırla
        working-directory: uPlot.rs
        run: |
          mkdir -p _site/wasm/www _site/wasm/pkg _site/assets
          cp -R wasm/www/. _site/wasm/www/
          cp -R wasm/pkg/. _site/wasm/pkg/
          cp assets/app-icon.svg _site/assets/app-icon.svg
          cp wasm/pages/index.html _site/index.html
          touch _site/.nojekyll
      - name: WASM artefaktını yükle
        uses: actions/upload-artifact@v5
        with:
          name: uplot-rs-wasm
          path: |
            uPlot.rs/wasm/pkg
            uPlot.rs/wasm/www
            uPlot.rs/wasm/README.md
          if-no-files-found: error
          retention-days: 1
      - name: Pages yapılandırması
        uses: actions/configure-pages@v5
      - name: Pages artefaktını yükle
        uses: actions/upload-pages-artifact@v4
        with:
          path: uPlot.rs/_site
          retention-days: 1

  deploy:
    name: uplot-rs-pages
    runs-on: ubuntu-24.04
    needs: wasm
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages'e yayınla
        id: deployment
        uses: actions/deploy-pages@v4

  cleanup:
    name: eski gece kayıtlarını temizle
    runs-on: ubuntu-24.04
    needs: [desktop, wasm, deploy]
    steps:
      - name: Yalnız son iki Pages dağıtımını tut
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/deployments?environment=github-pages&per_page=100" \
            --jq '.[].id' | tail -n +3 | while read -r deployment_id; do
              gh api --method POST \
                "repos/${GITHUB_REPOSITORY}/deployments/${deployment_id}/statuses" \
                -f state=inactive >/dev/null
              gh api --method DELETE \
                "repos/${GITHUB_REPOSITORY}/deployments/${deployment_id}"
            done
      - name: Yalnız bu gece koşusunu tut
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/nightly-builds.yml/runs?per_page=100" \
            --jq '.workflow_runs[].id' | while read -r run_id; do
              if [ "${run_id}" != "${CURRENT_RUN_ID}" ]; then
                gh api --method DELETE \
                  "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}"
              fi
            done
