name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cekirdek:
    runs-on: ubuntu-latest
    steps:
      - name: uPlot.rs
        uses: actions/checkout@v4
        with:
          path: uPlot.rs
      - name: Kilitli uPlot
        uses: actions/checkout@v4
        with:
          repository: leeoniya/uPlot
          ref: 0e5812c504430f5c804e0f993376d8999b26cc34
          path: uPlot
      - name: Güncel GPUI
        uses: actions/checkout@v4
        with:
          repository: hakantr/gpui
          path: gpui
      - name: Güncel GPUI bileşen kütüphanesi
        uses: actions/checkout@v4
        with:
          repository: hakantr/gpui_kutuphanesi
          path: gpui_kutuphanesi
      - uses: dtolnay/rust-toolchain@1.95
        with:
          components: clippy,rustfmt
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Linux sistem bağımlılıkları
        run: >-
          sudo apt-get update && sudo apt-get install -y
          libasound2-dev libfontconfig1-dev libwayland-dev libxkbcommon-dev
          libxkbcommon-x11-dev libxcb1-dev libxcb-render0-dev
          libxcb-shape0-dev libxcb-xfixes0-dev libudev-dev
      - name: Kaynak kilidi ve uyum envanteri
        working-directory: uPlot.rs
        run: npm --prefix tools/uyum run denetle
      - name: Biçim
        working-directory: uPlot.rs
        run: cargo fmt --all --check
      - name: Clippy
        working-directory: uPlot.rs
        run: cargo clippy --all-targets -- -D warnings
      - name: Testler
        working-directory: uPlot.rs
        run: cargo test --all-targets
      - name: İlk kart smoke testi
        working-directory: uPlot.rs
        run: cargo run --example ilk_kart
      - name: WASM çekirdeği
        working-directory: uPlot.rs
        run: cargo check -p uplot-rs-wasm --target wasm32-unknown-unknown
